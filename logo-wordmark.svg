<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80">
  <defs>
    <linearGradient id="goldLogo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e8d5a3"/>
      <stop offset="40%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#9a7834"/>
    </linearGradient>
  </defs>

  <!-- Emblem mark (left) -->
  <!-- Outer ring -->
  <circle cx="40" cy="40" r="30" fill="none" stroke="#c9a84c" stroke-width="0.6" opacity="0.25"/>
  <!-- Diamond -->
  <polygon points="40,12 64,40 40,68 16,40"
    fill="none" stroke="url(#goldLogo)" stroke-width="1" opacity="0.6"/>
  <!-- Inner diamond -->
  <polygon points="40,24 52,40 40,56 28,40"
    fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>
  <!-- Centre -->
  <circle cx="40" cy="40" r="2.5" fill="#c9a84c" opacity="0.5"/>

  <!-- Hairline vertical divider -->
  <line x1="86" y1="16" x2="86" y2="64" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>

  <!-- Wordmark — PADDY -->
  <text x="98" y="36"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="400"
    fill="url(#goldLogo)"
    letter-spacing="6">PADDY</text>

  <!-- Wordmark — SPACE (italic) -->
  <text x="99" y="60"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="300"
    font-style="italic"
    fill="#e8d5a3"
    opacity="0.75"
    letter-spacing="5.5">Space</text>

  <!-- Thin rule between PADDY / SPACE -->
  <line x1="98" y1="42" x2="344" y2="42" stroke="#c9a84c" stroke-width="0.4" opacity="0.2"/>
</svg>
