<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bgA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0a05"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </linearGradient>
    <linearGradient id="goldA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8d5a3"/>
      <stop offset="50%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#7a5f28"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#c9a84c" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded background (iOS style) -->
  <rect width="180" height="180" rx="38" ry="38" fill="url(#bgA)"/>
  <ellipse cx="90" cy="90" rx="80" ry="80" fill="url(#glowA)"/>

  <!-- Outer border -->
  <rect x="6" y="6" width="168" height="168" rx="33" ry="33"
    fill="none" stroke="#c9a84c" stroke-width="0.6" opacity="0.3"/>

  <!-- Corner marks -->
  <line x1="12"  y1="12"  x2="30"  y2="12"  stroke="#c9a84c" stroke-width="1.2" opacity="0.6"/>
  <line x1="12"  y1="12"  x2="12"  y2="30"  stroke="#c9a84c" stroke-width="1.2" opacity="0.6"/>
  <line x1="168" y1="12"  x2="150" y2="12"  stroke="#c9a84c" stroke-width="1.2" opacity="0.6"/>
  <line x1="168" y1="12"  x2="168" y2="30"  stroke="#c9a84c" stroke-width="1.2" opacity="0.6"/>
  <line x1="12"  y1="168" x2="30"  y2="168" stroke="#c9a84c" stroke-width="1.2" opacity="0.6"/>
  <line x1="12"  y1="168" x2="12"  y2="150" stroke="#c9a84c" stroke-width="1.2" opacity="0.6"/>
  <line x1="168" y1="168" x2="150" y2="168" stroke="#c9a84c" stroke-width="1.2" opacity="0.6"/>
  <line x1="168" y1="168" x2="168" y2="150" stroke="#c9a84c" stroke-width="1.2" opacity="0.6"/>

  <!-- Outer ring -->
  <circle cx="90" cy="90" r="55" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.18"/>

  <!-- Diamond -->
  <polygon points="90,44 136,90 90,136 44,90"
    fill="none" stroke="url(#goldA)" stroke-width="1" opacity="0.55"/>

  <!-- Inner diamond glow -->
  <polygon points="90,62 116,90 90,118 64,90"
    fill="#c9a84c" opacity="0.04"/>

  <!-- Centre dot -->
  <circle cx="90" cy="90" r="3" fill="#c9a84c" opacity="0.45"/>

  <!-- PS lettermark -->
  <text x="47" y="104"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="42"
    font-weight="300"
    font-style="italic"
    fill="url(#goldA)"
    letter-spacing="2"
    opacity="0.93">PS</text>

  <!-- Bottom label -->
  <text x="90" y="155"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="7"
    fill="#c9a84c"
    letter-spacing="4"
    opacity="0.5">PADDY SPACE</text>
</svg>
