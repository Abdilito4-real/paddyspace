  <line x1="1" y1="31" x2="1"  y2="26" stroke="#c9a84c" stroke-width="0.8" opacity="0.7"/>
  <line x1="31" y1="31" x2="26" y2="31" stroke="#c9a84c" stroke-width="0.8" opacity="0.7"/>
